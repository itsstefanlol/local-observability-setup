global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: dotnet-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8080
        labels:
          app: backend
          language: dotnet

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080
        labels:
          component: containers

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          component: host